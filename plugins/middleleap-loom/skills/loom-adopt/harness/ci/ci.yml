# Reference CI workflow for a Loom adoption. Copy to .github/workflows/ci.yml (a control-plane
# file — own it in CODEOWNERS, HG-0002). It runs every bundled gate on each PR, so the Loom's
# controls are actually ENFORCED, not merely documented. `control-plane-check.mjs` names this
# exact path as a CONTROL_TARGET; this file is what it guards.
#
# ADOPT: add your project's own Q-gates (build+unit, SAST, integration) per
# ../loom/references/delivery-harness.md, and fill the SAST/SCA seams (Snyk/Chainguard, see
# supply-chain-security.md). Node >= 18.
name: loom-gates

on:
  push:
    branches: [main]
  pull_request:
  merge_group:   # the routine auto-merge lane runs in the merge-queue context

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Q1b + secrets history need real git history, not a shallow clone
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bundled test suites (discovery gates + renderer + the gate tests)
        run: node --test discovery/gates/*.test.mjs discovery/render/*.test.mjs scripts/*.test.mjs core/*.test.mjs

      - name: Warp & control-plane gates
        run: |
          node scripts/control-plane-check.mjs        # HG-0002 — control-plane owned in CODEOWNERS
          node scripts/control-catalog-check.mjs       # control state of record cannot overstate itself
          node scripts/discovery-link-check.mjs        # HG-0007 — features trace to a green hand-off
          node scripts/routine-change-check.mjs        # HG-0013 · normal-human-review — an unqualified routine CLAIM fails; ordinary work passes

      - name: Product-governance gates (envelope · PA1/PA2 · A1–A5 · identities)
        run: |
          node scripts/identity-registry-check.mjs     # approvals resolve; agents never approve; 2nd line ∩ builders = ∅
          node scripts/change-envelope-check.mjs        # classified, compiled, reconciled, state receipts + compound prod auth
          node scripts/product-approval-check.mjs       # PA1 before Develop, PA2 before launch — approvals resolve
          node scripts/architecture-assurance-check.mjs # A1–A5 with threat→control→test traceability
          node scripts/operational-readiness-check.mjs  # R1–R6 with freshness windows — stale drills block
          node scripts/adapter-check.mjs                 # enterprise adapters map to real catalog controls

      - name: Runtime assurance gates (scheduled lane — also safe to run per PR)
        run: |
          node scripts/assurance-cycle-check.mjs        # signed six-step cycle records, second-line confirmed
          node scripts/assurance-case-check.mjs         # rc.14 WS6 — signal-triggered cases within SLA, mapped, contained, second-line decided
          node scripts/decision-log-check.mjs           # replayable, append-only agent decision log
          node scripts/platform-activation-check.mjs    # rc.12 WS2 — platform-enforced graduation: live observation, bypass-tested, independently signed, fresh
          node scripts/config-reconciliation-check.mjs  # rc.12 WS2.4 — live config reconciled against the approved baseline; drift suspends routine auto-merge

      # Risk-proportionate alternative to the explicit lists above: the runner reads the
      # catalog's lanes + path scopes and executes only what this diff implicates —
      # recording every skip. Use it once your catalog lanes are tuned:
      #   node core/gate-runner.mjs --lane pr --base origin/main --out gate-run.json
      # and on release:  node core/gate-runner.mjs --lane release --out gate-run-release.json

      - name: Test integrity & security gates (Q1b · Q2 · Q4)
        run: |
          node scripts/test-integrity-check.mjs        # Q1b — tests didn't get weaker on the way to green
          node scripts/sast-check.mjs                   # Q2 — SAST output is real and within policy
          node scripts/secrets-scan.mjs                 # Q4 — no secrets in tree OR history
          node scripts/supply-chain-check.mjs           # Q4 — SBOM + audit + provenance are real

      - name: Model, evidence, data & feedback gates
        run: |
          node scripts/model-provenance-check.mjs      # HG-0006 — models pinned/tiered/evaluated, reports sealed
          # Bind the eval to the PR HEAD sha, never GITHUB_SHA (the ephemeral merge commit on a PR).
          node scripts/product-eval-check.mjs --commit "${{ github.event.pull_request.head.sha || github.sha }}"  # discovery-linked, measures green, fresh vs the head commit
          node scripts/release-subject-check.mjs        # rc.11 WS1 — the immutable artifact subject is coherent (real commit, digest-pinned artifact, trusted builder)
          node scripts/release-attestation-check.mjs    # rc.11 WS1 — source→artifact→evals→anchor all bind to ONE digest (closes the F1 self-reference)
          node scripts/evidence-seal-check.mjs          # HG-0003 — release evidence sealed, commit-bound (40-hex, no symbolic subject), semantically verified
          node scripts/data-lifecycle-check.mjs         # retention & right-to-erasure declared
          node scripts/operations-signal-check.mjs      # Run→Discovery signals triaged & traceable
          node scripts/brainkit-check.mjs               # rc.8 — institutional BrainKit conformance (mandatory-when-compiled)
          node scripts/guardrail-policy-check.mjs       # rc.13 WS4 — runtime-neutral guardrail coverage is explicit + honest (no implied protection)

      - name: Cost telemetry (report, never a gate)
        run: node scripts/token-report.mjs --check   # validate the token ledger is well-formed; spend never blocks a merge

      - name: Discovery runs are gate-green (D1–D9)
        # rc.13 WS3: the data-risk register is MANDATORY-WHEN-COMPILED — if any governed change's
        # compiled plan requires the data_risk_register capability (a regulated/institution profile
        # is in its envelope), a missing register FAILS D6 with NO flag. --require-register /
        # LOOM_REQUIRE_REGISTER survive only as a manual TIGHTENING (they can force it on, never turn
        # a compiled requirement off) — a CI-config change can no longer weaken a regulated build. A
        # non-regulated adopter with no compiling change and no flag still skips. There are no
        # discovery/runs/ until you author one — by then, mount your register.
        run: |
          shopt -s nullglob
          for run in discovery/runs/*/; do
            node discovery/gates/validate.mjs "$run" --require-register
          done

  # Routine auto-merge lane (HG-0013) — its OWN job, hence its OWN status context. GitHub
  # reports a check per job, not per step: while this lived as a step inside `gates`, an
  # ordinary PR (which is SUPPOSED to fail `--assert-routine`) failed the whole `gates` job and
  # could not be merged even by a human. As a separate job it fails in isolation.
  #
  # ADOPT (branch protection): mark `gates` required for every PR; do NOT mark `routine-qualified`
  # required. Instead point the merge queue / auto-merge ruleset at `routine-qualified` alone, so
  # ONLY a genuinely qualifying routine claim auto-merges and every ordinary PR still needs a human.
  # It runs on pull_request + merge_group (never on the push-to-main build, where it would flake red).
  routine-qualified:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: routine-qualified (exits 0 only for a qualifying routine claim)
        run: node scripts/routine-change-check.mjs --assert-routine --base origin/main
